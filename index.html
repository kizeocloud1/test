<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PS3 THM KZ</title>
    <style>
        /* Estilos base para PS3 - Optimizados para NetFront */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: #0b0f17; color: #e0e5f0; font-family: Arial, sans-serif; line-height: 1.2; padding: 20px 0; text-align: center; }

        .main-container { width: 1750px; margin: 0 auto; text-align: left; }

        .header { overflow: hidden; margin-bottom: 25px; border-bottom: 5px solid #ff6b35; padding-bottom: 20px; text-align: center; }
        .logo-img { height: 115px; float: left; cursor: pointer; }

        .social-container { float: right; background: #0a1a2a; padding: 10px 30px; border-radius: 60px; border: 3px solid #ff6b35; margin-top: 15px; }
        .social-icon { width: 62px; height: 62px; margin: 0 7px; vertical-align: middle; }

        /* ===== TOOLBAR ===== */
        .toolbar {
            display: table;
            width: 100%;
            background: #0a1a2a;
            padding: 15px 25px;
            border-radius: 60px;
            margin-bottom: 25px;
            border-left: 6px solid #ff6b35;
            height: 86px;
            box-sizing: border-box;
        }
        .toolbar-left, .toolbar-right {
            display: table-cell;
            vertical-align: middle;
        }
        .toolbar-right { text-align: right; }

        .search-wrapper {
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        .search-wrapper input {
            width: 310px;
            height: 50px;
            padding: 0 22px;
            background: #0b1a2a;
            border: 2px solid #1e3b4f;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            vertical-align: middle;
        }

        .btn-aleatorio {
            display: inline-block;
            background: #ff6b35;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            padding: 0 20px;
            border-radius: 40px;
            height: 50px;
            line-height: 50px;
            font-size: 14px;
            border: 2px solid #ff6b35;
            vertical-align: middle;
            cursor: pointer;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .sort-buttons {
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        .sort-btn {
            height: 50px;
            background: #1e3b4f;
            border: 2px solid #1e3b4f;
            color: #c9d9e8;
            padding: 0 22px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 7px;
            font-size: 15px;
            vertical-align: middle;
            line-height: 46px;
        }
        .credits-banner {
            height: 42px;
            display: inline-block;
            margin-top: 73px;
            margin-bottom: -20px;
            vertical-align: bottom;
        }
        .stats {
            display: inline-block;
            vertical-align: middle;
            color: #9ab8d9;
            font-weight: bold;
            font-size: 18px;
            margin-right: 20px;
        }
        .btn-pkg {
            display: inline-block;
            background: #ff6b35;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            padding: 0 25px;
            border-radius: 40px;
            height: 50px;
            line-height: 50px;
            font-size: 16px;
            border: 2px solid #ff6b35;
            vertical-align: middle;
        }

        /* Contador de genero seleccionado junto a VERSION PKG */
        .genre-filter-count {
            display: none;
            vertical-align: middle;
            background: #0a1a2a;
            border: 2px solid #ff6b35;
            color: #ffb28c;
            font-weight: bold;
            font-size: 16px;
            padding: 0 20px;
            border-radius: 40px;
            height: 50px;
            line-height: 50px;
            margin-right: 12px;
        }

        .sort-btn.active { background: #ff6b35; color: #0b0f17; border-color: #ff6b35; }
        .btn-genre-active { background: #0b1a2a; border-color: #ffb28c; color: #ffb28c; display: none; }
        .btn-adult { border-color: #ff3535; color: #ff9b9b; }
        .btn-adult.active { background: #ff3535; color: white; }

        /* ===== LAYOUT SIDEBAR + GRID ===== */
        .body-layout {
            display: table;
            width: 100%;
            table-layout: fixed;
        }
        .sidebar-cell {
            display: table-cell;
            width: 220px;
            vertical-align: top;
            padding-right: 18px;
        }
        .content-cell {
            display: table-cell;
            vertical-align: top;
        }

        /* ===== SIDEBAR DE GENEROS ===== */
        .genre-sidebar {
            background: #0a1a2a;
            border-radius: 18px;
            border: 2px solid #1e3b4f;
            border-left: 5px solid #ff6b35;
            overflow: hidden;
        }
        .sidebar-title {
            background: #ff6b35;
            color: #0b0f17;
            font-weight: bold;
            font-size: 15px;
            padding: 13px 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Sin barra de scroll: se expande al alto que necesite */
        .genre-list {
            overflow: visible;
        }
        .genre-item {
            display: block;
            width: 100%;
            padding: 11px 16px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #0f2030;
            color: #b0c8e0;
            font-size: 14px;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            text-decoration: none;
        }
        .genre-item:hover { background: #112030; color: #ffb28c; }
        .genre-item.active { background: #1e3b4f; color: #ff6b35; border-left: 4px solid #ff6b35; padding-left: 12px; }

        /* Contador solo visible en el boton Todos */
        .todos-count {
            float: right;
            background: #0b1a2a;
            color: #5a7a90;
            font-size: 12px;
            padding: 2px 7px;
            border-radius: 8px;
            font-weight: normal;
        }
        .genre-item.active .todos-count {
            background: #ff6b3530;
            color: #ffb28c;
        }

        /* ===== GRID ===== */
        .grid { text-align: center; min-height: 600px; }

        .theme-card { width: 350px; background: #0e1727; border-radius: 20px; overflow: hidden; border: 2px solid #1f3a4c; display: inline-block; vertical-align: top; margin: 12px; text-align: left; }
        .preview { width: 100%; background: #000; text-align: center; border-bottom: 3px solid #ff6b35; height: 225px; line-height: 225px; overflow: hidden; }
        .preview img { max-width: 100%; max-height: 100%; vertical-align: middle; }

        .card-info { padding: 20px; }
        .theme-name { font-weight: bold; font-size: 19px; color: #fff; height: 45px; overflow: hidden; margin-bottom: 8px; }
        .theme-genre { background: #1e3b4f; padding: 6px 12px; border-radius: 10px; font-size: 14px; font-weight: bold; color: #ffb28c; margin-bottom: 15px; display: inline-block; border: 1px solid #ff6b35; cursor: pointer; }
        .download-btn { background: #ff6b35; color: #0b0f17; text-decoration: none; font-weight: bold; padding: 12px; border-radius: 40px; text-align: center; display: block; font-size: 15px; }

        .pagination-container { text-align: center; margin: 40px 0; }
        .page-box { display: inline-block; width: 50px; height: 50px; line-height: 46px; background: #1e3b4f; border: 2px solid #1e3b4f; color: #fff; margin: 0 4px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; text-decoration: none; vertical-align: middle; }
        .page-box.active { background: #ff6b35; border-color: #ff6b35; color: #0b0f17; }

        .footer { margin-top: 50px; border-top: 3px solid #ff6b3540; padding: 25px 0; color: #b0c8e0; font-size: 16px; }
        .clearfix::after { content: ""; display: table; clear: both; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header clearfix">
        <img src="recursos/titulo.png" alt="Logo" class="logo-img" onclick="volverInicio()">

        <img src="recursos/credits.png" class="credits-banner">

        <div class="social-container">
            <a href="https://www.youtube.com/@kizeo0/videos"><img src="recursos/yt.png" class="social-icon"></a>
            <a href="https://github.com/kizeo0"><img src="recursos/git.png" class="social-icon"></a>
            <a href="https://x.com/KiZeo0"><img src="recursos/x.png" class="social-icon"></a>
        </div>
    </div>

    <div class="toolbar">
        <div class="toolbar-left">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="buscarConRetraso()">
                <button class="btn-aleatorio" onclick="modoAleatorio()">Aleatorio</button>
            </div>
            <div class="sort-buttons">
                <button class="sort-btn btn-adult" id="adultBtn" onclick="toggleAdulto()">+18 OFF</button>
                <button class="sort-btn btn-genre-active" id="genreActiveBtn" onclick="volverInicio()"></button>
            </div>
        </div>
        <div class="toolbar-right">
            <span class="stats" id="stats">...</span>
            <span class="genre-filter-count" id="genreFilterCount"></span>
            <a href="https://github.com/kizeo0/PS3-THM-KZ/releases/download/PKG/PS3.THM.KZ.pkg" class="btn-pkg">VERSION PKG</a>
        </div>
    </div>

    <!-- LAYOUT: SIDEBAR IZQUIERDO + GRID DERECHO -->
    <div class="body-layout">

        <div class="sidebar-cell">
            <div class="genre-sidebar">
                <div class="sidebar-title">Generos</div>
                <div class="genre-list" id="genreList">
                    <div style="padding:16px; color:#5a7a90; font-size:13px;">Cargando...</div>
                </div>
            </div>
        </div>

        <div class="content-cell">
            <div id="themeGrid" class="grid">
                <div id="loadingMsg" style="padding:40px; color:#ffb28c;">Cargando base de datos...</div>
            </div>
            <div class="pagination-container" id="pagination"></div>
        </div>

    </div>

    <div class="footer clearfix">
        <span style="float:left">© PS3 THM KZ</span>
        <span style="float:right">Youtube KiZeo</span>
    </div>
</div>

<script>
    // Variables de configuracion
    var JSON_URL = 'temas_ps3_conlinks.json';
    var PAGE_SIZE = 12;
    var PALABRAS_ADULTO = ['adult', '18+', 'girls/adult', 'sexy', 'ecchi', 'hentai', 'babes', 'harem', 'j-idols', 'j-idol', 'people', 'Girl', 'Girls'];
    var G_EMPTY_GIF = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";

    // RUTAS FIJAS
    var baseCompresed = 'https://raw.githubusercontent.com/kizeocloud1/Previews-compresed/main/';
    var PREVIEW_FOLDERS = [
        baseCompresed + 'previews1/',
        baseCompresed + 'previews2/',
        baseCompresed + 'previews3/',
        baseCompresed + 'previews4/',
        baseCompresed + 'previews5/',
        baseCompresed + 'previews6/'
    ];

    // Variables de estado
    var allThemes = [];
    var filteredThemes = [];
    var currentPage = 0;
    var currentGenre = '';
    var mostrarContenidoAdulto = false;
    var esModoAleatorio = false;
    var searchTimer = null;
    var imageQueue = [];

    // Elementos del DOM
    var grid = document.getElementById('themeGrid');
    var statsDiv = document.getElementById('stats');
    var paginationDiv = document.getElementById('pagination');
    var searchInput = document.getElementById('searchInput');
    var genreList = document.getElementById('genreList');

    function ps3Trim(str) {
        return str.replace(/^\s+|\s+$/g, '');
    }

    // Devuelve true si el genero dado es de contenido adulto
    function esGeneroAdulto(genero) {
        var gen = genero.toLowerCase();
        for (var i = 0; i < PALABRAS_ADULTO.length; i++) {
            if (gen.indexOf(PALABRAS_ADULTO[i].toLowerCase()) !== -1) {
                return true;
            }
        }
        return false;
    }

    function cargarJSON() {
        var xhr = new XMLHttpRequest();
        var url = JSON_URL + '?t=' + new Date().getTime();

        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200 || xhr.status === 0) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        allThemes = [];
                        for (var i = 0; i < data.length; i++) {
                            var item = data[i];
                            allThemes.push({
                                archivo: item.archivo,
                                descarga: item.descarga,
                                genero: item.genero || 'Otro',
                                nombre: item.archivo.replace(/\.p3t$/i, ''),
                                preview_idx: item.preview_idx || 0
                            });
                        }
                        construirSidebar();
                        aplicarFiltros();
                    } catch(e) {
                        grid.innerHTML = '<div style="color:red">Error de memoria o JSON invalido.</div>';
                    }
                } else {
                    grid.innerHTML = '<div style="color:red">No se pudo cargar el archivo JSON (Error ' + xhr.status + ').</div>';
                }
            }
        };
        xhr.send(null);
    }

    // ===== SIDEBAR: construir lista de generos =====
    function construirSidebar() {
        // Recoger generos unicos, ordenarlos alfabeticamente
        // y excluir los adultos si +18 esta en OFF
        var seen = {};
        var genres = [];
        for (var i = 0; i < allThemes.length; i++) {
            var g = allThemes[i].genero;
            if (!seen[g]) {
                seen[g] = true;
                // Solo incluir el genero adulto si +18 esta activado
                if (!esGeneroAdulto(g) || mostrarContenidoAdulto) {
                    genres.push(g);
                }
            }
        }
        genres.sort(function(a, b) {
            if (a < b) return -1;
            if (a > b) return 1;
            return 0;
        });

        // Calcular total visible (sin adultos si estan ocultos)
        var totalVisible = 0;
        for (var t = 0; t < allThemes.length; t++) {
            if (!esGeneroAdulto(allThemes[t].genero) || mostrarContenidoAdulto) {
                totalVisible++;
            }
        }

        // "Todos" con el total visible, el resto solo el nombre
        var activeClass = (currentGenre === '') ? 'genre-item active' : 'genre-item';
        var html = '<button class="' + activeClass + '" id="genre-btn-todos" onclick="volverInicio()">' +
                   'Todos <span class="todos-count">' + totalVisible + '</span></button>';

        for (var j = 0; j < genres.length; j++) {
            var gn = genres[j];
            var safeG = gn.replace(/'/g, "&#39;");
            var itemClass = (gn === currentGenre) ? 'genre-item active' : 'genre-item';
            html += '<button class="' + itemClass + '" onclick="filtrarPorGenero(\'' + safeG + '\')">' + gn + '</button>';
        }

        genreList.innerHTML = html;
    }

    // Resalta el boton activo en el sidebar
    function actualizarSidebarActivo() {
        var items = genreList.getElementsByTagName('button');
        for (var i = 0; i < items.length; i++) {
            items[i].className = 'genre-item';
        }
        if (currentGenre === '') {
            var todosBtn = document.getElementById('genre-btn-todos');
            if (todosBtn) todosBtn.className = 'genre-item active';
        } else {
            for (var k = 0; k < items.length; k++) {
                var rawText = items[k].innerHTML;
                var spanTag = items[k].getElementsByTagName('span');
                if (spanTag.length > 0) {
                    rawText = rawText.replace(spanTag[0].outerHTML, '');
                }
                rawText = rawText.replace(/^\s+|\s+$/g, '');
                if (rawText === currentGenre) {
                    items[k].className = 'genre-item active';
                    break;
                }
            }
        }
    }

    // Muestra u oculta el contador de genero junto a VERSION PKG
    function actualizarContadorGenero() {
        var countEl = document.getElementById('genreFilterCount');
        if (!countEl) return;
        if (currentGenre !== '') {
            countEl.style.display = 'inline-block';
            countEl.innerHTML = currentGenre + ': ' + filteredThemes.length;
        } else {
            countEl.style.display = 'none';
        }
    }

    window.buscarConRetraso = function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() {
            currentGenre = '';
            currentPage = 0;
            esModoAleatorio = false;
            actualizarSidebarActivo();
            aplicarFiltros();
        }, 600);
    };

    function aplicarFiltros() {
        var query = ps3Trim(searchInput.value).toLowerCase();
        filteredThemes = [];

        var genreBtn = document.getElementById('genreActiveBtn');
        if (currentGenre !== '') {
            genreBtn.style.display = 'inline-block';
            genreBtn.innerHTML = currentGenre + " X";
        } else {
            genreBtn.style.display = 'none';
        }

        for (var i = 0; i < allThemes.length; i++) {
            var t = allThemes[i];
            var genNormalizado = t.genero.toLowerCase();

            var isAdult = esGeneroAdulto(t.genero);
            if (!mostrarContenidoAdulto && isAdult) continue;

            if (t.nombre.toLowerCase().indexOf(query) !== -1 &&
                (currentGenre === '' || genNormalizado === currentGenre.toLowerCase())) {
                filteredThemes.push(t);
            }
        }
        render();
    }

    function crearHTMLTarjeta(t, index, esDestacado) {
        var imgName = encodeURIComponent(t.nombre + '.png').replace(/'/g, "%27");
        var folder = PREVIEW_FOLDERS[t.preview_idx] || PREVIEW_FOLDERS[0];
        var estiloExtra = esDestacado ? ' style="border-color: #ffb28c; box-shadow: 0 0 10px #ffb28c;"' : '';
        var safeGenre = t.genero.replace(/'/g, "&#39;");

        imageQueue.push({ id: 'img_' + index, src: folder + imgName, name: imgName, idx: t.preview_idx });

        return '<div class="theme-card"' + estiloExtra + '>' +
            '<div class="preview"><img src="' + G_EMPTY_GIF + '" id="img_' + index + '"></div>' +
            '<div class="card-info">' +
                '<div class="theme-name">' + t.nombre + '</div>' +
                '<div class="theme-genre" onclick="filtrarPorGenero(\'' + safeGenre + '\')">' + t.genero + '</div>' +
                '<a href="' + t.descarga + '" class="download-btn">DESCARGAR</a>' +
            '</div>' +
        '</div>';
    }

    function procesarColaImagenes() {
        if (imageQueue.length === 0) return;

        var item = imageQueue.shift();
        var imgEl = document.getElementById(item.id);

        if (imgEl) {
            imgEl.onload = function() { procesarColaImagenes(); };
            imgEl.onerror = function() {
                window.proximaCarpeta(this, item.idx, item.name, function() {
                    procesarColaImagenes();
                });
            };
            imgEl.src = item.src;
        } else {
            procesarColaImagenes();
        }
    }

    function render() {
        imageQueue = [];
        var html = "";

        if (!esModoAleatorio && currentPage === 0 && currentGenre === '' && ps3Trim(searchInput.value) === '') {
            var destacados = [];
            for (var k = 0; k < allThemes.length; k++) {
                if (allThemes[k].genero === 'AnimugenZ') destacados.push(allThemes[k]);
                if (destacados.length >= 2) break;
            }
            for (var d = 0; d < destacados.length; d++) html += crearHTMLTarjeta(destacados[d], 'dest_' + d, true);
        }

        var start = currentPage * PAGE_SIZE;
        var end = Math.min(start + PAGE_SIZE, filteredThemes.length);

        for (var i = start; i < end; i++) {
            html += crearHTMLTarjeta(filteredThemes[i], i, false);
        }

        grid.innerHTML = html || '<div style="padding:40px;">No se encontraron resultados.</div>';
        statsDiv.innerHTML = filteredThemes.length + ' Temas';
        actualizarContadorGenero();

        dibujarPaginacion();
        setTimeout(procesarColaImagenes, 100);
    }

    function dibujarPaginacion() {
        var totalPages = Math.ceil(filteredThemes.length / PAGE_SIZE);
        paginationDiv.innerHTML = '';
        if (totalPages <= 1) return;

        var startPage = Math.max(0, currentPage - 4);
        var endPage = Math.min(totalPages - 1, startPage + 9);

        for (var p = startPage; p <= endPage; p++) {
            var btn = document.createElement('button');
            btn.className = (p === currentPage) ? 'page-box active' : 'page-box';
            btn.innerHTML = (p + 1);
            btn.onclick = (function(page) {
                return function() {
                    currentPage = page;
                    render();
                    window.scrollTo(0, 300);
                };
            })(p);
            paginationDiv.appendChild(btn);
        }
    }

    window.proximaCarpeta = function(img, idx, name, callback) {
        var nIdx = idx + 1;
        if (nIdx < PREVIEW_FOLDERS.length) {
            img.onerror = function() { proximaCarpeta(img, nIdx, name, callback); };
            img.onload = function() { if (callback) callback(); };
            img.src = PREVIEW_FOLDERS[nIdx] + name;
        } else {
            img.style.display = 'none';
            if (callback) callback();
        }
    };

    window.modoAleatorio = function() {
        esModoAleatorio = true;
        filteredThemes.sort(function() { return 0.5 - Math.random(); });
        currentPage = 0;
        render();
    };

    window.toggleAdulto = function() {
        mostrarContenidoAdulto = !mostrarContenidoAdulto;
        var btn = document.getElementById('adultBtn');
        btn.innerHTML = mostrarContenidoAdulto ? "+18 ON" : "+18 OFF";
        btn.className = mostrarContenidoAdulto ? "sort-btn btn-adult active" : "sort-btn btn-adult";
        // Si el genero activo era adulto y se ocultan, volver a Todos
        if (!mostrarContenidoAdulto && currentGenre !== '' && esGeneroAdulto(currentGenre)) {
            currentGenre = '';
            var countEl = document.getElementById('genreFilterCount');
            if (countEl) countEl.style.display = 'none';
        }
        currentPage = 0;
        // Reconstruir sidebar para mostrar u ocultar generos adultos
        construirSidebar();
        aplicarFiltros();
    };

    window.filtrarPorGenero = function(g) {
        currentGenre = g;
        searchInput.value = '';
        currentPage = 0;
        actualizarSidebarActivo();
        aplicarFiltros();
    };

    window.volverInicio = function() {
        searchInput.value = '';
        currentGenre = '';
        currentPage = 0;
        esModoAleatorio = false;
        actualizarSidebarActivo();
        var countEl = document.getElementById('genreFilterCount');
        if (countEl) countEl.style.display = 'none';
        aplicarFiltros();
    };

    window.addEventListener("unload", function() {
        allThemes = null;
        filteredThemes = null;
        imageQueue = null;
        grid.innerHTML = "";
    });

    setTimeout(cargarJSON, 500);
</script>
</body>
</html>

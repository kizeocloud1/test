<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PS3 THM KZ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: #0b0f17; color: #e0e5f0; font-family: Arial, sans-serif; line-height: 1.2; padding: 20px 0; text-align: center; }
        
        .main-container { width: 1750px; margin: 0 auto; text-align: left; } 

        /* HEADER OPTIMIZADO PARA CRÉDITOS ARRIBA */
        .header { 
            position: relative; /* Necesario para ubicar créditos */
            overflow: visible; 
            margin-bottom: 25px; 
            border-bottom: 5px solid #ff6b35; 
            padding-bottom: 20px; 
            height: 140px; 
        }
        .logo-img { height: 115px; float: left; cursor: pointer; }

        .social-container { float: right; background: #0a1a2a; padding: 10px 30px; border-radius: 60px; border: 3px solid #ff6b35; margin-top: 15px; }
        .social-icon { width: 62px; height: 62px; margin: 0 7px; vertical-align: middle; }

        /* CRÉDITOS: UBICADOS EN EL MEDIO APOYADOS EN LA LÍNEA */
        .credits-banner {
            position: absolute;
            bottom: -5px; /* Toca exactamente la línea naranja */
            left: 50%;
            margin-left: -150px; /* Ajuste para centrar (mitad de su ancho aprox) */
            height: 45px;
            z-index: 10;
        }

        /* TOOLBAR AHORA TIENE TODO EL ESPACIO */
        .toolbar {
            display: table;
            width: 100%;
            background: #0a1a2a;
            padding: 15px 25px;
            border-radius: 60px;
            margin-bottom: 25px;
            border-left: 6px solid #ff6b35;
            height: 86px;
            box-sizing: border-box;
        }
        .toolbar-left, .toolbar-right { display: table-cell; vertical-align: middle; }
        .toolbar-right { text-align: right; }

        .search-wrapper { display: inline-block; vertical-align: middle; }
        .search-wrapper input {
            width: 350px; /* Un poco más ancho ya que hay espacio */
            height: 55px;
            padding: 0 25px;
            background: #0b1a2a;
            border: 2px solid #1e3b4f;
            border-radius: 50px;
            color: white;
            font-size: 20px;
            vertical-align: middle;
        }
        
        .btn-aleatorio {
            display: inline-block;
            background: #ff6b35;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            padding: 0 35px;
            border-radius: 10px;
            height: 60px;
            line-height: 60px;
            font-size: 24px;
            text-align: center;
            border: 2px solid #ff6b35;
            vertical-align: middle;
            cursor: pointer;
            margin-left: 20px;
            text-transform: uppercase;
        }

        .btn-genre-active { 
            display: none;
            background: #0b1a2a; 
            border: 2px solid #ffb28c; 
            color: #ffb28c; 
            height: 55px;
            line-height: 51px;
            padding: 0 25px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            vertical-align: middle;
            margin-left: 20px;
            cursor: pointer;
        }

        .stats { display: inline-block; vertical-align: middle; color: #9ab8d9; font-weight: bold; font-size: 20px; margin-right: 25px; }
        .btn-pkg {
            display: inline-block;
            background: #ff6b35;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            padding: 0 30px;
            border-radius: 40px;
            height: 55px;
            line-height: 55px;
            font-size: 18px;
            border: 2px solid #ff6b35;
            vertical-align: middle;
        }

        /* Resto de estilos del grid y tarjetas se mantienen igual */
        .grid { text-align: center; clear: both; min-height: 600px; padding-top: 10px; }
        .theme-card { width: 350px; background: #0e1727; border-radius: 20px; overflow: hidden; border: 2px solid #1f3a4c; display: inline-block; vertical-align: top; margin: 12px; text-align: left; }
        .preview { width: 100%; background: #000; text-align: center; border-bottom: 3px solid #ff6b35; height: 225px; line-height: 225px; overflow: hidden; }
        .preview img { max-width: 100%; max-height: 100%; vertical-align: middle; }
        .card-info { padding: 20px; }
        .theme-name { font-weight: bold; font-size: 19px; color: #fff; height: 45px; overflow: hidden; margin-bottom: 8px; }
        .theme-genre { background: #1e3b4f; padding: 6px 12px; border-radius: 10px; font-size: 14px; font-weight: bold; color: #ffb28c; margin-bottom: 15px; display: inline-block; border: 1px solid #ff6b35; cursor: pointer; }
        .download-btn { background: #ff6b35; color: #0b0f17; text-decoration: none; font-weight: bold; padding: 12px; border-radius: 40px; text-align: center; display: block; font-size: 15px; }
        .pagination-container { text-align: center; margin: 40px 0; }
        .page-box { display: inline-block; width: 50px; height: 50px; line-height: 46px; background: #1e3b4f; border: 2px solid #1e3b4f; color: #fff; margin: 0 4px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; text-decoration: none; vertical-align: middle; }
        .page-box.active { background: #ff6b35; border-color: #ff6b35; color: #0b0f17; }
        .clearfix::after { content: ""; display: table; clear: both; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header clearfix">
        <img src="recursos/titulo.png" alt="Logo" class="logo-img" onclick="volverInicio()">
        
        <img src="recursos/credits.png" class="credits-banner"> <div class="social-container">
            <a href="https://www.youtube.com/@kizeo0/videos"><img src="recursos/yt.png" class="social-icon"></a>
            <a href="https://github.com/kizeo0"><img src="recursos/git.png" class="social-icon"></a>
            <a href="https://x.com/KiZeo0"><img src="recursos/x.png" class="social-icon"></a>
        </div>
    </div>

    <div class="toolbar">
        <div class="toolbar-left">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="buscarConRetraso()">
                <button class="btn-aleatorio" onclick="modoAleatorio()">Aleatorio</button>
            </div>
            <button class="btn-genre-active" id="genreActiveBtn" onclick="volverInicio()"></button>
        </div>
        <div class="toolbar-right">
            <span class="stats" id="stats">...</span>
            <a href="https://github.com/kizeo0/PS3-THM-KZ/releases/download/PKG/PS3.THM.KZ.pkg" class="btn-pkg">VERSION PKG</a>
        </div>
    </div>

    <div id="themeGrid" class="grid">
        <div style="padding:40px; color:#ffb28c;">Cargando base de datos...</div>
    </div>

    <div class="pagination-container" id="pagination"></div>
</div>

<script>
    // Se mantiene TODA la lógica optimizada de carga secuencial de imágenes, 
    // ps3Trim y XHR para máxima compatibilidad con el navegador de PS3.
    var JSON_URL = 'temas_ps3_conlinks.json';
    var PAGE_SIZE = 12; 
    var PALABRAS_ADULTO = ['adult', '18+', 'girls/adult', 'sexy', 'ecchi', 'hentai', 'babes', 'harem', 'j-idols', 'j-idol', 'people','Girl','Girls'];
    var G_EMPTY_GIF = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
    var PREVIEW_FOLDERS = ['previews1/', 'previews2/', 'https://raw.githubusercontent.com/kizeocloud1/ps3cloud/main/previews3/', 'https://raw.githubusercontent.com/kizeocloud1/ps3cloud1/main/previews4/', 'https://raw.githubusercontent.com/kizeocloud1/ps3cloud2/main/previews5/'];

    var allThemes = [], filteredThemes = [], currentPage = 0, currentGenre = '', esModoAleatorio = false, searchTimer = null, imageQueue = [];

    function ps3Trim(str) { return str.replace(/^\s+|\s+$/g, ''); }

    function cargarJSON() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', JSON_URL + '?t=' + new Date().getTime(), true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && (xhr.status === 200 || xhr.status === 0)) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    allThemes = [];
                    for (var i = 0; i < data.length; i++) {
                        allThemes.push({ archivo: data[i].archivo, descarga: data[i].descarga, genero: data[i].genero || 'Otro', nombre: data[i].archivo.replace(/\.p3t$/i, ''), preview_idx: data[i].preview_idx || 0 });
                    }
                    aplicarFiltros();
                } catch(e) { document.getElementById('themeGrid').innerHTML = "Error JSON"; }
            }
        };
        xhr.send(null);
    }

    window.buscarConRetraso = function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() { currentGenre = ''; currentPage = 0; esModoAleatorio = false; aplicarFiltros(); }, 600);
    };

    function aplicarFiltros() {
        var query = ps3Trim(document.getElementById('searchInput').value).toLowerCase();
        filteredThemes = [];
        var gb = document.getElementById('genreActiveBtn');
        if(currentGenre !== '') { gb.style.display = 'inline-block'; gb.innerHTML = currentGenre + " [X]"; } 
        else { gb.style.display = 'none'; }

        for (var i = 0; i < allThemes.length; i++) {
            var t = allThemes[i];
            if(t.nombre.toLowerCase().indexOf(query) !== -1 && (currentGenre === '' || t.genero.toLowerCase() === currentGenre.toLowerCase())) {
                filteredThemes.push(t);
            }
        }
        render();
    }

    function render() {
        imageQueue = [];
        var html = "";
        var start = currentPage * PAGE_SIZE;
        var end = Math.min(start + PAGE_SIZE, filteredThemes.length);
        
        for (var i = start; i < end; i++) {
            var t = filteredThemes[i];
            var imgName = encodeURIComponent(t.nombre + '.png').replace(/'/g, "%27");
            var folder = PREVIEW_FOLDERS[t.preview_idx] || PREVIEW_FOLDERS[0];
            imageQueue.push({ id: 'img_' + i, src: folder + imgName, name: imgName, idx: t.preview_idx });
            html += '<div class="theme-card"><div class="preview"><img src="'+G_EMPTY_GIF+'" id="img_'+i+'"></div><div class="card-info"><div class="theme-name">'+t.nombre+'</div><div class="theme-genre" onclick="filtrarPorGenero(\''+t.genero.replace(/'/g, "\\'")+'\')">'+t.genero+'</div><a href="'+t.descarga+'" class="download-btn">DESCARGAR</a></div></div>';
        }
        document.getElementById('themeGrid').innerHTML = html || "Sin resultados";
        document.getElementById('stats').innerHTML = filteredThemes.length + ' Temas';
        dibujarPaginacion();
        setTimeout(procesarCola, 100);
    }

    function procesarCola() {
        if (imageQueue.length === 0) return;
        var item = imageQueue.shift();
        var img = document.getElementById(item.id);
        if (img) {
            img.onload = function() { procesarCola(); };
            img.onerror = function() { window.proximaCarpeta(this, item.idx, item.name, function(){ procesarCola(); }); };
            img.src = item.src;
        } else { procesarCola(); }
    }

    function dibujarPaginacion() {
        var total = Math.ceil(filteredThemes.length / PAGE_SIZE);
        var pDiv = document.getElementById('pagination');
        pDiv.innerHTML = '';
        if(total <= 1) return;
        for (var p = 0; p < total; p++) {
            if(p < 15) { // Limitar botones para no saturar
                var btn = document.createElement('button');
                btn.className = (p === currentPage) ? 'page-box active' : 'page-box';
                btn.innerHTML = (p + 1);
                btn.onclick = (function(page) { return function() { currentPage = page; render(); window.scrollTo(0, 300); }; })(p);
                pDiv.appendChild(btn);
            }
        }
    }

    window.proximaCarpeta = function(img, idx, name, cb) {
        var nIdx = idx + 1;
        if(nIdx < PREVIEW_FOLDERS.length) {
            img.onerror = function() { proximaCarpeta(img, nIdx, name, cb); };
            img.onload = function() { if(cb) cb(); };
            img.src = PREVIEW_FOLDERS[nIdx] + name;
        } else { img.style.display = 'none'; if(cb) cb(); }
    };

    window.modoAleatorio = function() { esModoAleatorio = true; filteredThemes.sort(function() { return 0.5 - Math.random(); }); currentPage = 0; render(); };
    window.filtrarPorGenero = function(g) { currentGenre = g; document.getElementById('searchInput').value = ''; currentPage = 0; aplicarFiltros(); };
    window.volverInicio = function() { document.getElementById('searchInput').value = ''; currentGenre = ''; currentPage = 0; esModoAleatorio = false; aplicarFiltros(); };

    setTimeout(cargarJSON, 500);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PS3 THM KZ</title>
    <style>
        /* Estilos base para PS3 - Optimizados para NetFront */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: #0b0f17; color: #e0e5f0; font-family: Arial, sans-serif; line-height: 1.2; padding: 20px 0; text-align: center; }
        
        .main-container { width: 1750px; margin: 0 auto; text-align: left; } 

        .header { overflow: hidden; margin-bottom: 25px; border-bottom: 5px solid #ff6b35; padding-bottom: 20px; }
        .logo-img { height: 115px; float: left; cursor: pointer; }

        .social-container { float: right; background: #0a1a2a; padding: 10px 30px; border-radius: 60px; border: 3px solid #ff6b35; margin-top: 15px; }
        .social-icon { width: 62px; height: 62px; margin: 0 7px; vertical-align: middle; }

        .toolbar { background: #162435; padding: 20px; border-radius: 15px; margin-bottom: 30px; overflow: hidden; border: 2px solid #2d4059; }
        
        .search-box { float: left; width: 600px; height: 65px; background: #0b0f17; border: 3px solid #ff6b35; border-radius: 12px; color: white; padding: 0 25px; font-size: 28px; }
        
        .genre-filter { float: right; }
        .btn-genre { background: #1f3044; color: white; border: 2px solid #3d5a80; padding: 15px 30px; margin-left: 12px; border-radius: 10px; font-size: 22px; cursor: pointer; }
        .btn-genre.active { background: #ff6b35; border-color: #ff9e7d; }

        .grid-themes { display: block; clear: both; }
        .theme-card { display: inline-block; width: 330px; background: #162435; margin: 8px; border-radius: 12px; vertical-align: top; overflow: hidden; border: 2px solid #2d4059; transition: transform 0.2s; }
        
        .preview-container { width: 330px; height: 185px; background: #000; overflow: hidden; position: relative; }
        .img-preview { width: 100%; height: 100%; object-fit: cover; border-bottom: 3px solid #ff6b35; }
        
        .theme-info { padding: 15px; text-align: center; }
        .theme-title { font-size: 20px; font-weight: bold; margin-bottom: 12px; color: #fff; height: 48px; overflow: hidden; }
        
        .btn-download { display: block; background: #ff6b35; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-size: 18px; font-weight: bold; }

        .pagination { margin-top: 40px; padding: 20px; }
        .page-box { display: inline-block; padding: 15px 25px; background: #162435; border: 2px solid #ff6b35; color: white; margin: 0 8px; border-radius: 8px; cursor: pointer; font-size: 22px; }
        .page-box.active { background: #ff6b35; font-weight: bold; }
        
        .loading-overlay { font-size: 30px; color: #ff6b35; padding: 50px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/PS3-Pro/PSN-Content/master/resources/img/psn_logo.png" class="logo-img" onclick="volverInicio()">
        <div class="social-container">
            </div>
    </div>

    <div class="toolbar">
        <input type="text" id="searchInput" class="search-box" placeholder="Buscar temas..." onkeyup="alEscribir()">
        <div class="genre-filter" id="genreFilter">
            <button class="btn-genre active" onclick="filtrarPorGenero('')">TODOS</button>
            <button class="btn-genre" onclick="filtrarPorGenero('Dynamic')">DINÁMICOS</button>
            <button class="btn-genre" onclick="filtrarPorGenero('Static')">ESTÁTICOS</button>
        </div>
    </div>

    <div id="gridThemes" class="grid-themes">
        <div class="loading-overlay">Cargando base de datos...</div>
    </div>

    <div id="pagination" class="pagination"></div>
</div>

<script>
    // Configuración Base
    var DATA_URL = "themes.json";
    var ITEMS_PER_PAGE = 20;
    var PREVIEW_FOLDERS = [
        "https://raw.githubusercontent.com/KiZeo/PS3-Themes-1/main/Previews/",
        "https://raw.githubusercontent.com/KiZeo/PS3-Themes-2/main/Previews/",
        "https://raw.githubusercontent.com/KiZeo/PS3-Themes-3/main/Previews/"
    ];

    // Estado de la Aplicación
    var allThemes = [];
    var filteredThemes = [];
    var currentPage = 0;
    var currentGenre = "";
    
    var gridThemes = document.getElementById('gridThemes');
    var paginationDiv = document.getElementById('pagination');
    var searchInput = document.getElementById('searchInput');

    // Inicialización Optimazada (Referencia 1)
    function init() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", DATA_URL, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    allThemes = JSON.parse(xhr.responseText);
                    aplicarFiltros();
                } catch(e) {
                    gridThemes.innerHTML = "Error al procesar base de datos.";
                }
            }
        };
        xhr.send();
    }

    function aplicarFiltros() {
        var query = searchInput.value.toLowerCase();
        filteredThemes = [];
        
        for (var i = 0; i < allThemes.length; i++) {
            var t = allThemes[i];
            var matchesSearch = t.name.toLowerCase().indexOf(query) !== -1;
            var matchesGenre = currentGenre === "" || t.genre === currentGenre;
            
            if (matchesSearch && matchesGenre) {
                filteredThemes.push(t);
            }
        }
        render();
    }

    function render() {
        // Limpieza de memoria (Fundamental para PS3)
        gridThemes.innerHTML = ""; 
        var start = currentPage * ITEMS_PER_PAGE;
        var end = Math.min(start + ITEMS_PER_PAGE, filteredThemes.length);
        
        var htmlBuffer = ""; // Usar buffer para evitar múltiples accesos al DOM

        for (var i = start; i < end; i++) {
            var theme = filteredThemes[i];
            var fileName = theme.file.replace(".pkg", ".jpg");
            
            htmlBuffer += '<div class="theme-card">' +
                '<div class="preview-container">' +
                    '<img src="' + PREVIEW_FOLDERS[0] + fileName + '" ' +
                    'class="img-preview" onerror="proximaCarpeta(this, 0, \'' + fileName + '\')">' +
                '</div>' +
                '<div class="theme-info">' +
                    '<div class="theme-title">' + theme.name + '</div>' +
                    '<a href="' + theme.url + '" class="btn-download">DESCARGAR PKG</a>' +
                '</div>' +
            '</div>';
        }

        gridThemes.innerHTML = htmlBuffer;
        renderPagination();
    }

    // Lógica de búsqueda de carpetas optimizada
    window.proximaCarpeta = function(img, folderIdx, name) {
        var nextIdx = folderIdx + 1;
        if (nextIdx < PREVIEW_FOLDERS.length) {
            // Desvincular el evento actual para evitar recursividad infinita accidental
            img.onerror = function() { proximaCarpeta(img, nextIdx, name); };
            img.src = PREVIEW_FOLDERS[nextIdx] + name;
        } else {
            img.onerror = null;
            img.style.display = 'none'; // Ocultar si no se encuentra en ningún servidor
        }
    };

    function renderPagination() {
        paginationDiv.innerHTML = "";
        var totalPages = Math.ceil(filteredThemes.length / ITEMS_PER_PAGE);
        if (totalPages <= 1) return;

        var htmlPagination = "";
        var startPage = Math.max(0, currentPage - 2);
        var endPage = Math.min(totalPages - 1, startPage + 4);

        for (var p = startPage; p <= endPage; p++) {
            var activeClass = (p === currentPage) ? ' active' : '';
            htmlPagination += '<button class="page-box' + activeClass + '" onclick="cambiarPagina(' + p + ')">' + (p + 1) + '</button>';
        }
        paginationDiv.innerHTML = htmlPagination;
    }

    window.cambiarPagina = function(p) {
        currentPage = p;
        render();
        window.scrollTo(0, 300);
    };

    window.filtrarPorGenero = function(g) {
        currentGenre = g;
        currentPage = 0;
        // Actualizar UI de botones
        var btns = document.getElementById('genreFilter').getElementsByTagName('button');
        for(var i=0; i<btns.length; i++) {
            btns[i].className = "btn-genre";
            if((g === "" && i === 0) || (g === "Dynamic" && i === 1) || (g === "Static" && i === 2)) {
                btns[i].className += " active";
            }
        }
        aplicarFiltros();
    };

    var searchTimer;
    window.alEscribir = function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() {
            currentPage = 0;
            aplicarFiltros();
        }, 500); // Delay para no procesar cada tecla (ahorra CPU en PS3)
    };

    window.volverInicio = function() {
        searchInput.value = "";
        currentGenre = "";
        currentPage = 0;
        aplicarFiltros();
    };

    // Iniciar
    init();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PS3 THM KZ - Optimized</title>
    <script>
        // Detección robusta de PS3 para optimización de rendimiento
        var isPS3 = /PS3|PlayStation 3|NetFront/i.test(navigator.userAgent) || window.location.search.indexOf("mode=ps3") > -1;
        if (isPS3) document.documentElement.className += " is-ps3";
    </script>
    <style>
        /* Estilos base optimizados */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: #0b0f17; color: #e0e5f0; font-family: Arial, sans-serif; line-height: 1.2; padding: 20px 0; text-align: center; }
        
        .main-container { width: 1750px; margin: 0 auto; text-align: left; } 
        .header { overflow: hidden; margin-bottom: 25px; border-bottom: 5px solid #ff6b35; padding-bottom: 20px; }
        .logo-img { height: 115px; float: left; cursor: pointer; }

        .social-container { float: right; background: #0a1a2a; padding: 10px 30px; border-radius: 60px; border: 3px solid #ff6b35; margin-top: 15px; }
        .social-icon { width: 62px; height: 62px; margin: 0 7px; vertical-align: middle; }

        .toolbar { background: #162130; padding: 20px; border-radius: 15px; margin-bottom: 30px; overflow: hidden; }
        .search-box { width: 600px; padding: 15px 25px; background: #0a1a2a; border: 3px solid #30475e; color: #fff; border-radius: 50px; font-size: 24px; float: left; }
        
        .nav-buttons { float: right; }
        .btn { background: #ff6b35; color: #fff; border: none; padding: 15px 35px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 22px; margin-left: 15px; }

        /* Grid optimizado para evitar saltos de línea incorrectos */
        .themes-grid { display: block; text-align: center; min-height: 600px; }
        .theme-card { 
            display: inline-block; width: 320px; margin: 15px; background: #1a2634; 
            border-radius: 15px; overflow: hidden; vertical-align: top;
            border: 2px solid #30475e; text-align: left;
        }

        /* Altura fija para la imagen para evitar reflows al cargar */
        .preview-container { width: 100%; height: 180px; background: #0a1a2a; overflow: hidden; }
        .theme-img { width: 100%; height: 180px; object-fit: cover; display: block; }

        .theme-info { padding: 15px; }
        .theme-title { font-size: 20px; font-weight: bold; color: #ff6b35; margin-bottom: 8px; height: 48px; overflow: hidden; }
        .theme-meta { font-size: 16px; color: #a0acbd; }

        .download-btn { 
            display: block; width: 100%; background: #22c55e; color: #fff; 
            text-align: center; padding: 15px; text-decoration: none; 
            font-weight: bold; font-size: 20px; border-top: 2px solid #30475e;
        }

        .pagination { margin-top: 40px; clear: both; }
        .page-box { 
            display: inline-block; padding: 12px 25px; background: #162130; 
            color: #fff; margin: 0 8px; border-radius: 8px; cursor: pointer; 
            font-size: 20px; border: 2px solid #30475e;
        }
        .page-box.active { background: #ff6b35; border-color: #ff6b35; }

        /* Ajustes específicos para PS3 */
        .is-ps3 .theme-card { border-width: 1px; box-shadow: none !important; }
        .is-ps3 .theme-img { image-rendering: -webkit-optimize-contrast; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <img src="logo.png" class="logo-img" onclick="volverInicio()">
        <div class="social-container">
            <img src="fb.png" class="social-icon">
            <img src="tw.png" class="social-icon">
            <img src="yt.png" class="social-icon">
        </div>
    </div>

    <div class="toolbar">
        <input type="text" id="searchInput" class="search-box" placeholder="Buscar temas..." oninput="buscar()">
        <div class="nav-buttons">
            <button class="btn" onclick="mostrarAleatorio()">Aleatorio</button>
            <button class="btn" style="background:#30475e" onclick="volverInicio()">Inicio</button>
        </div>
    </div>

    <div id="themesGrid" class="themes-grid">
        </div>

    <div id="pagination" class="pagination"></div>
</div>

<script>
    // Variables globales
    var allThemes = [];
    var filteredThemes = [];
    var currentPage = 0;
    var itemsPerPage = 12;
    var G_EMPTY_GIF = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
    var PREVIEW_FOLDERS = ["previews1/", "previews2/", "previews3/"];

    // Elementos del DOM cacheados para velocidad
    var gridEl = document.getElementById('themesGrid');
    var paginationEl = document.getElementById('pagination');
    var searchInput = document.getElementById('searchInput');

    // Carga de JSON mediante XMLHttpRequest (Optimizado para PS3)
    function loadData() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'themes.json', true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                allThemes = JSON.parse(xhr.responseText);
                filteredThemes = allThemes;
                render();
            }
        };
        xhr.send();
    }

    function render() {
        if (!gridEl) return;
        
        var start = currentPage * itemsPerPage;
        var end = start + itemsPerPage;
        var currentBatch = filteredThemes.slice(start, end);
        
        var htmlBuffer = ""; // Buffering de strings para evitar reflows
        for (var i = 0; i < currentBatch.length; i++) {
            var theme = currentBatch[i];
            var safeName = theme.name.replace(/"/g, '&quot;');
            
            htmlBuffer += '<div class="theme-card">' +
                '<div class="preview-container">' +
                    '<img src="' + G_EMPTY_GIF + '" data-real-src="' + PREVIEW_FOLDERS[0] + theme.preview + '" ' +
                    'class="theme-img" id="img_' + start + i + '" ' +
                    'onerror="proximaCarpeta(this, 0, \'' + theme.preview + '\')">' +
                '</div>' +
                '<div class="theme-info">' +
                    '<div class="theme-title">' + safeName + '</div>' +
                    '<div class="theme-meta">Género: ' + (theme.genre || 'General') + '</div>' +
                '</div>' +
                '<a href="' + theme.url + '" class="download-btn">DESCARGAR .P3T</a>' +
            '</div>';
        }
        
        gridEl.innerHTML = htmlBuffer;
        
        // Disparar la carga de imágenes reales después de inyectar el HTML
        var imgs = gridEl.getElementsByTagName('img');
        for (var j = 0; j < imgs.length; j++) {
            var ds = imgs[j].getAttribute('data-real-src');
            if (ds) imgs[j].src = ds;
        }
        
        renderPagination();
    }

    window.proximaCarpeta = function(img, idx, name) {
        var nIdx = idx + 1;
        if (nIdx < PREVIEW_FOLDERS.length) {
            img.onerror = function() { proximaCarpeta(img, nIdx, name); };
            img.src = PREVIEW_FOLDERS[nIdx] + name;
        } else {
            img.style.display = 'none';
        }
    };

    function renderPagination() {
        var totalPages = Math.ceil(filteredThemes.length / itemsPerPage);
        var pBuffer = "";
        
        for (var i = 0; i < totalPages; i++) {
            var activeClass = (i === currentPage) ? 'active' : '';
            pBuffer += '<div class="page-box ' + activeClass + '" onclick="cambiarPagina(' + i + ')">' + (i + 1) + '</div>';
        }
        paginationEl.innerHTML = pBuffer;
    }

    window.cambiarPagina = function(p) {
        currentPage = p;
        render();
        window.scrollTo(0, 300);
    };

    window.buscar = function() {
        var q = searchInput.value.toLowerCase();
        filteredThemes = allThemes.filter(function(t) {
            return t.name.toLowerCase().indexOf(q) > -1;
        });
        currentPage = 0;
        render();
    };

    window.mostrarAleatorio = function() {
        filteredThemes = allThemes.slice().sort(function() { return 0.5 - Math.random(); });
        currentPage = 0;
        render();
    };

    window.volverInicio = function() {
        searchInput.value = '';
        filteredThemes = allThemes;
        currentPage = 0;
        render();
    };

    // Limpieza de memoria al salir (Optimización de Referencia 1)
    window.addEventListener("unload", function() {
        allThemes = null;
        filteredThemes = null;
        if (gridEl) gridEl.innerHTML = "";
    });

    // Inicio
    loadData();

</script>
</body>
</html>
